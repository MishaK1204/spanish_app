<div class="card-shell">
  <button
    type="button"
    class="card-face"
    (click)="flip.emit()"
    [attr.aria-label]="flipped() ? 'Show Spanish' : 'Show English'"
  >
    <span class="side-pill">{{ flipped() ? 'English' : 'Spanish' }}</span>
    @if (!flipped()) {
      <span class="word word--es">{{ spanish() }}</span>
      <span class="card-hint">Tap to reveal English</span>
    } @else {
      <span class="word word--en">{{ english() }}</span>
      <span class="card-hint">Tap to show Spanish again</span>
    }
  </button>
  <button
    type="button"
    class="speak-btn"
    (click)="speak.emit(); $event.stopPropagation()"
    aria-label="Play pronunciation of Spanish word"
    title="Listen to pronunciation"
  >
    <svg class="speak-svg" viewBox="0 0 24 24" aria-hidden="true">
      <path
        fill="currentColor"
        d="M3 10v4h4l5 5V5L7 10H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
      />
    </svg>
  </button>
</div>
